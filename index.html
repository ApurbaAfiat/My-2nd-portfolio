  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  /* Selection */
  ::selection { background: rgba(91,140,247,0.3); color: #fff; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes float {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-8px); }

  @keyframes pulseGlow {
    0%,100% { box-shadow: 0 0 20px rgba(91,140,247,0.2); }
    50%      { box-shadow: 0 0 40px rgba(91,140,247,0.5); }

  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }

  @keyframes orb1 {
    0%,100% { transform: translate(0,0) scale(1); }
    33%      { transform: translate(60px,-40px) scale(1.1); }
    66%      { transform: translate(-40px,50px) scale(0.9); }
  }
  @keyframes orb2 {
    0%,100% { transform: translate(0,0) scale(1); }
    33%      { transform: translate(-50px,60px) scale(1.05); }
    66%      { transform: translate(40px,-30px) scale(0.95); }

  @keyframes typing {
    from { width: 0; }
    to   { width: 100%; }
  }
  @keyframes blink {
    50% { border-color: transparent; }
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }

  .animate-fadeUp  { animation: fadeUp 0.7s ease both; }
  .animate-fadeIn  { animation: fadeIn 0.6s ease both; }
  .animate-float   { animation: float 4s ease-in-out infinite; }
  .animate-pulseGlow { animation: pulseGlow 3s ease-in-out infinite; }
  .animate-orb1    { animation: orb1 12s ease-in-out infinite; }
  .animate-orb2    { animation: orb2 15s ease-in-out infinite; }
  .animate-spin-slow { animation: spin-slow 20s linear infinite; }

  .delay-100 { animation-delay: 0.1s; }
  .delay-200 { animation-delay: 0.2s; }
  .delay-300 { animation-delay: 0.3s; }
  .delay-400 { animation-delay: 0.4s; }
  .delay-500 { animation-delay: 0.5s; }
  .delay-600 { animation-delay: 0.6s; }

  /* Reveal on scroll */
  .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* Gradient text */
  .grad-text {
    background: linear-gradient(135deg, #5b8cf7 0%, #a78bfa 50%, #34d399 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;

    background: linear-gradient(135deg, #60a5fa 0%, #818cf8 100%);

    -webkit-text-fill-color: transparent;

    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border-color: rgba(91,140,247,0.35);

  .noise::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");

    z-index: 0;

    width: 12px; height: 12px;
    background: var(--accent);

    content: '';

    border: 1px solid rgba(255,255,255,0.1);

    font-size: 0.75rem;
    color: var(--accent);

    backdrop-filter: blur(20px) !important;

    transition: all 0.2s ease;
  }

    color: var(--accent);

</style>

// ─── UTILS ──────────────────────────────────────────────────────────────────
function useScrollReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}
